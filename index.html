  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background-color: #f4f2ed;
      color: #1e2a5e;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 75% 55% at 50% 45%, rgba(220,225,242,0.45) 0%, rgba(244,242,237,0) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .frame {
      position: fixed;
      inset: 22px;
      border: 1px solid rgba(30,42,94,0.2);
      z-index: 1;
      pointer-events: none;
    }
    .frame::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(30,42,94,0.07);
    }

    .corner {
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: rgba(30,42,94,0.5);
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: -1px; left: -1px; border-top-width: 1.5px; border-left-width: 1.5px; }
    .corner.tr { top: -1px; right: -1px; border-top-width: 1.5px; border-right-width: 1.5px; }
    .corner.bl { bottom: -1px; left: -1px; border-bottom-width: 1.5px; border-left-width: 1.5px; }
    .corner.br { bottom: -1px; right: -1px; border-bottom-width: 1.5px; border-right-width: 1.5px; }

    main {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .monogram {
      width: 68px;
      height: 68px;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    }

    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      color: rgba(30,42,94,0.6);
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) 0.4s forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.2rem, 9vw, 6.5rem);
      line-height: 1;
      letter-spacing: 0.08em;
      color: #1e2a5e;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) 0.55s forwards;
    }

    .rule {
      width: 72px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(30,42,94,0.35), transparent);
      margin: 2rem auto;
      opacity: 0;
      animation: fadeIn 1.4s ease 0.9s forwards;
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.4vw, 1.55rem);
      color: rgba(30,42,94,0.75);
      letter-spacing: 0.02em;
      line-height: 1.7;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 1.2s cubic-bezier(0.22,1,0.36,1) 1.0s forwards;
    }

    .soon {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 0.75rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(30,42,94,0.45);
      opacity: 0;
      animation: fadeIn 1.6s ease 1.3s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
